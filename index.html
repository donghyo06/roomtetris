<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --accent:#0066FF; --pos:#00BF40; --neg:#FF4242; --ink:#111; --muted:#6b7280; --line:rgba(0,0,0,0.08);
    --card:0 1px 2px rgba(16,24,40,.04), 0 8px 20px rgba(16,24,40,.06); --sb:54px; }

  .rt-device{ width:402px; height:874px; border-radius:52px; overflow:hidden; position:relative; font-family:inherit;
    box-shadow:0 40px 90px rgba(0,0,0,.35), 0 0 0 10px #1b1b1f, 0 0 0 11px #333; }
  .rt-device.dark{ background:#000; }
  .rt-device.light{ background:#F2F2F7; }
  .rt-island{ position:absolute; top:11px; left:50%; transform:translateX(-50%); width:126px; height:36px; border-radius:24px; background:#000; z-index:50; }
  .rt-home{ position:absolute; bottom:9px; left:50%; transform:translateX(-50%); width:139px; height:5px; border-radius:99px; z-index:60; pointer-events:none; }
  /* phone: fill the real screen, hide fake chrome, respect safe areas */
  @media (max-width:480px){
    body{ padding:0; align-items:stretch; justify-content:stretch; }
    :root{ --sb: max(env(safe-area-inset-top, 0px), 12px); }
    .rt-device{ width:100vw; height:100vh; height:100dvh; border-radius:0; box-shadow:none; }
    .rt-island, .rt-home, .rt-statusbar{ display:none !important; }
    .rt-footer{ padding-bottom: calc(30px + env(safe-area-inset-bottom, 0px)) !important; }
  }
  input[type=range]{ -webkit-appearance:none; appearance:none; height:4px; border-radius:99px; background:#e5e7eb; outline:none; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:24px; height:24px; border-radius:50%; background:#fff; border:2px solid var(--accent); box-shadow:0 1px 4px rgba(0,0,0,.2); cursor:pointer; }
  input[type=range]::-moz-range-thumb{ width:24px; height:24px; border-radius:50%; background:#fff; border:2px solid var(--accent); cursor:pointer; }
  @keyframes scanpulse { 0%,100%{opacity:.35} 50%{opacity:.9} }
  @keyframes sweep { 0%{transform:translateY(-100%)} 100%{transform:translateY(500%)} }
  .no-sb{ scrollbar-width:none; -ms-overflow-style:none; }
  .no-sb::-webkit-scrollbar{ display:none; width:0; height:0; }
  button{ -webkit-tap-highlight-color:transparent; }
  @keyframes fadein { from{opacity:0} to{opacity:1} }
  @keyframes sheetup { from{opacity:.5; transform:translateY(32px)} to{opacity:1; transform:none} }
  @keyframes dim { from{opacity:0} to{opacity:1} }
  .rt-fade{ animation:fadein .34s cubic-bezier(.22,.7,.3,1) both; }
  .rt-cardbtn{ transition:transform .15s ease, box-shadow .22s ease; }
  .rt-cardbtn:active{ transform:scale(.984); }
  @media (hover:hover){ .rt-cardbtn:hover{ transform:translateY(-2px); box-shadow:0 10px 24px rgba(16,24,40,.10) !important; } }
</style>

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, Fragment } = React;

/* ─── design-system-like primitives (standalone replacements for Wanted WDS) ─── */
const Type = ({ v='body', weight, color, children, style }) => {

};
const Btn = ({ children, onClick, variant='solid', size='large', full=true, disabled, style }) => {
  const base = { border:'none', borderRadius:14, fontWeight:700, cursor:disabled?'default':'pointer',
    width:full?'100%':'auto', fontFamily:'inherit', transition:'transform .1s ease, opacity .15s, box-shadow .2s',
    opacity:disabled?0.45:1, padding:size==='large'?'15px 20px':'9px 16px', fontSize:size==='large'?16:14 };
  const variants = {
    solid:{ background:'linear-gradient(180deg, #2079ff, var(--accent) 60%)', color:'#fff',

  return <button disabled={disabled} onClick={onClick}

    onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}

};
const Badge = ({ children, color='var(--accent)', bg, size='small' }) => (
  <span style={{ display:'inline-flex', alignItems:'center', gap:4, background:bg||'rgba(0,102,255,0.1)',

    fontSize:size==='xsmall'?11:12, lineHeight:1.2, whiteSpace:'nowrap' }}>{children}</span>
);
const Chip = ({ label, active, onClick }) => (
  <button onClick={onClick} style={{ border:'none', cursor:'pointer', fontFamily:'inherit',
    padding:'8px 15px', borderRadius:99, fontSize:14, fontWeight:600, whiteSpace:'nowrap',
    background:active?'var(--accent)':'#fff', color:active?'#fff':'#374151', transition:'background .18s, color .18s, box-shadow .18s',
    boxShadow:active?'0 4px 12px rgba(0,102,255,.28)':'inset 0 0 0 1px var(--line), 0 1px 3px rgba(16,24,40,.05)' }}>{label}</button>
);
const SectionMessage = ({ title, children }) => (
  <div style={{ display:'flex', gap:10, background:'rgba(0,102,255,0.06)', border:'1px solid rgba(0,102,255,0.15)',
    borderRadius:14, padding:'12px 14px' }}>
    <div style={{ width:18, height:18, borderRadius:'50%', background:'var(--accent)', color:'#fff',
      fontSize:12, fontWeight:800, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, marginTop:1 }}>i</div>
    <div>
      <div style={{ fontWeight:700, fontSize:13.5, color:'#1e3a8a' }}>{title}</div>
      <div style={{ fontSize:13, color:'#3b5bb8', marginTop:2, lineHeight:1.45 }}>{children}</div>

/* ─── iOS device frame (ported from ios-frame.jsx) ─── */
function StatusBar({ dark }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div className="rt-statusbar" style={{ position:'absolute', top:0, left:0, right:0, zIndex:30, height:54,
      display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 30px 0 34px' }}>

      <div style={{ display:'flex', gap:7, alignItems:'center', marginTop:6 }}>
        <svg width="19" height="12" viewBox="0 0 19 12"><rect x="0" y="7.5" width="3.2" height="4.5" rx=".7" fill={c}/><rect x="4.8" y="5" width="3.2" height="7" rx=".7" fill={c}/><rect x="9.6" y="2.5" width="3.2" height="9.5" rx=".7" fill={c}/><rect x="14.4" y="0" width="3.2" height="12" rx=".7" fill={c}/></svg>
        <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5 5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/><circle cx="8.5" cy="10.5" r="1.5" fill={c}/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13"><rect x=".5" y=".5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity=".35" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill={c}/><path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5 26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity=".4"/></svg>
      </div>
    </div>

}
function Device({ children, dark, footer, overlay }) {
  return (
    <div className={"rt-device "+(dark?"dark":"light")}>
      <div className="rt-island" />
      <StatusBar dark={dark} />
      <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column' }}>
        <div className="rt-fade no-sb" style={{ flex:1, overflow:'auto', paddingTop:'var(--sb)' }}>{children}</div>
        {footer && <div className="rt-footer" style={{ padding:'12px 20px 30px', background:dark?'transparent':'rgba(242,242,247,0.92)',
          backdropFilter:'blur(14px)', WebkitBackdropFilter:'blur(14px)', borderTop:dark?'none':'1px solid rgba(0,0,0,0.05)' }}>{footer}</div>}
      </div>
      {overlay}
      <div className="rt-home" style={{ background:dark?'rgba(255,255,255,.7)':'rgba(0,0,0,.28)' }} />
    </div>
  );
}
const Scroll = ({ children, style }) => <div style={{ padding:'8px 20px 20px', ...style }}>{children}</div>;
const H = ({ title, sub, dark }) => (
  <div style={{ padding:'6px 20px 14px' }}>
    <Type v="title1" weight="bold" color={dark?'#fff':undefined} style={{letterSpacing:-0.5}}>{title}</Type>
    {sub && <Type v="body2" color={dark?'rgba(255,255,255,.6)':'var(--muted)'} style={{marginTop:6}}>{sub}</Type>}
  </div>
);

/* ─── furniture data + fit logic (ported verbatim from app-logic.dc.js) ─── */
const FURN = [
  { id:'sofa3', name:'3인 소파', cat:'소파', w:220, d:95, h:85, price:890000, fg:'#0066FF' },
  { id:'sofa2', name:'2인 소파', cat:'소파', w:160, d:90, h:80, price:590000, fg:'#0066FF' },
  { id:'bedQ', name:'퀸 침대', cat:'침대', w:163, d:203, h:100, price:1290000, fg:'#A44BE0' },
  { id:'bedK', name:'킹 침대', cat:'침대', w:183, d:203, h:100, price:1590000, fg:'#A44BE0' },
  { id:'bedSS', name:'슈퍼싱글 침대', cat:'침대', w:110, d:203, h:95, price:790000, fg:'#A44BE0' },
  { id:'desk', name:'책상 1400', cat:'테이블', w:140, d:70, h:75, price:240000, fg:'#00A038' },
  { id:'dining', name:'4인 식탁', cat:'테이블', w:140, d:80, h:75, price:420000, fg:'#00A038' },
  { id:'shelf', name:'책장 800', cat:'수납', w:80, d:35, h:180, price:150000, fg:'#D97B00' },
  { id:'ward', name:'옷장 1200', cat:'수납', w:120, d:60, h:200, price:680000, fg:'#D97B00' },
];
const DOOR = 80;
const won = n => n.toLocaleString('ko-KR') + '원';

/* ─── AI backend: key-hiding proxy(권장) 또는 각자 키로 직접 호출 ─── */
const DEFAULT_PROXY = 'https://roomtetris-ai.dlehdgy2068.workers.dev';  // ← 배포한 프록시 Worker URL을 넣으면(예: 'https://roomtetris-ai.xxx.workers.dev') 사용자는 키 없이 사용
// 공용 가구 카탈로그 Worker 주소(중복제거·공유·GLB 영구보관). 비우면 로컬 전용으로만 동작.
const CATALOG_API = 'https://roomtetris-catalog.dlehdgy2068.workers.dev';
const _catBase = ()=> (CATALOG_API||'').trim().replace(/\/$/,'');
const _prodKey = (s)=>{ try{ const u=new URL(s); u.hash=''; [...u.searchParams.keys()].forEach(k=>{ if(/^(utm_|fbclid|gclid|ref|spm|_ga)/i.test(k)) u.searchParams.delete(k); }); return (u.origin+u.pathname+(u.search||'')).toLowerCase(); }catch(e){ return String(s||'').trim().toLowerCase(); } };
function aiEndpoint(){
  let proxy=(DEFAULT_PROXY||'').trim();
  if(proxy.endsWith('/')) proxy=proxy.slice(0,-1);
  return { url:proxy, headers:{ 'content-type':'application/json' } };
}

/* ─── AI: extract furniture specs from a product page (Anthropic API + web_fetch tool) ─── */
async function aiFetchFurniture(url, hintName){
  const hint=(hintName||'').trim();
  const intro = hint
    ? '가구 정보를 수집하는 작업이야. 판매 URL: ' + url + ' (페이지는 차단돼 있을 수 있음). 사용자가 알려준 정확한 제품명: "' + hint + '". web_search로 이 제품명을 검색해 치수·가격·대표 사진·외형 정보를 수집해. 페이지가 읽히면 참고하되, 이 제품명과 일치하는 상품의 정보만 사용해. '
    : '가구 판매 페이지에서 정보를 추출하는 작업이야. 대상 URL: ' + url +
      ' — 절차: 1) web_fetch로 페이지를 읽어. 2) 내용이 비어 있거나 차단됐으면 web_search로 알아내: 먼저 URL 전체로 검색하고, 쿠팡·지마켓처럼 URL에 상품번호만 있으면 "사이트명 상품번호"(예: 쿠팡 8065760959)로 검색해 그 상품의 제품명을 먼저 알아낸 뒤, 그 제품명으로 다시 검색해 치수·가격·사진을 모아. 3) 이렇게 모은 정보는 이 URL의 바로 그 상품(같은 제품명)이 확실할 때만 사용해. ';
  const prompt = intro +
    '절대 규칙: 비슷해 보이는 다른 상품의 정보로 대체하지 마. 페이지로도 검색으로도 이 상품이 무엇인지 특정하지 못하면, 지어내지 말고 {"fail":"이유 한 문장(예: 사이트가 봇을 차단해 읽을 수 없음)"} JSON만 출력해. ' +
    '상품을 특정한 경우: 일부 치수만 불명확하면 같은 상품군의 일반값으로 보정하고 desc 끝에 "(일부 치수 추정)"을 붙여. 응답 마지막에 코드블록 없이 JSON 객체 하나만 출력해: ' +
    '{"name":"제품명(짧게)","shape":"sofa|bed|table|shelf|wardrobe 중 하나","w":가로숫자,"d":깊이숫자,"h":높이숫자,"price":가격숫자,"image":"대표 상품 사진의 절대 URL(jpg/png/webp, 못 찾으면 빈 문자열)","desc":"외형 상세 묘사: 전체 형태, 부위별 색상(hex 추정), 재질, 다리 모양·개수, 쿠션·서랍·선반·헤드보드 구성 등 3~4문장"} ' +
    'JSON 문자열 값 안에 중괄호 문자를 쓰지 마. 치수는 반드시 cm 단위 숫자(mm이면 10으로 나눠), 가격은 원 단위 숫자(모르면 0). 책상·식탁·테이블은 table, 서랍장·수납장·옷장은 wardrobe, 선반·책장은 shelf, 소파는 sofa, 침대·매트리스는 bed.';
  const ep = aiEndpoint();
  const tools=[{ type:'web_fetch_20250910', name:'web_fetch', max_uses:4 },
    { type:'web_search_20250305', name:'web_search', max_uses:3 }];
  let messages=[{ role:'user', content:prompt }], data=null;
  for(let turn=0; turn<4; turn++){
    const res = await fetch(ep.url, {
      method:'POST',
      headers:{ ...ep.headers, 'anthropic-beta':'web-fetch-2025-09-10' },
      body: JSON.stringify({ model:'claude-sonnet-5', max_tokens:3000, tools:tools, messages:messages })
    });
    if(!res.ok){ let msg='요청 실패 ('+res.status+')';
      try{ const e=await res.json(); if(e&&e.error&&e.error.message) msg=e.error.message; }catch(_){}
      throw new Error(msg); }
    data = await res.json();
    if(data.stop_reason!=='pause_turn') break;
    messages = messages.concat([{ role:'assistant', content:data.content }]);
  }
  const texts=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join(' ');
  const b=texts.lastIndexOf('}'); const a=texts.lastIndexOf('{', b);
  if(a<0||b<=a) throw new Error('페이지에서 가구 정보를 찾지 못했어요. 다른 링크로 시도해 보세요.');
  let j=null; try{ j=JSON.parse(texts.slice(a, b+1)); }
  catch(e){ throw new Error('정보 해석에 실패했어요. 한 번 더 시도해 주세요.'); }
  return j;
}

/* ─── AI: generate a look-alike three.js model from product photo + description ─── */
async function aiBuildModel(spec){
  const rules = 'three.js r128 코드 작성 규칙: (THREE, W, D, H, COLOR) 인자를 받는 함수의 본문만 작성하고 반드시 THREE.Group을 return. ' +
    'W=가로(x), D=깊이(z), H=높이(y), 단위 cm. 바닥 y=0, x/z 중심 0 근처. 전체 크기가 W×D×H에 맞아야 함. ' +
    'BoxGeometry, CylinderGeometry, SphereGeometry, ConeGeometry, TorusGeometry와 MeshStandardMaterial만 사용(geometry.translate/rotate 허용). CapsuleGeometry 등 r128에 없는 클래스는 절대 금지. ' +
    '텍스처·이미지 로드·비동기·document/window/fetch 접근 금지. 부품 15~40개, 전체 120줄 이내로 완결되게. 실물의 색상(hex로 직접 지정), 비례, 특징(다리 모양·개수, 쿠션 수, 서랍·선반, 프레임, 팔걸이, 헤드보드 등)을 최대한 충실히 재현. ' +
    '코드는 <model>과 </model> 사이에만 출력하고 다른 텍스트·코드블록 금지.';
  const content=[];
  if(spec.image){ content.push({ type:'image', source:{ type:'url', url:spec.image } }); }
  content.push({ type:'text', text:
    (spec.image?'첨부한 상품 사진과 ':'')+'다음 정보를 바탕으로 이 가구를 실물과 최대한 비슷하게 재현하는 three.js 코드를 작성해줘. '+
    '제품명: '+spec.name+', 크기: W'+spec.w+' × D'+spec.d+' × H'+spec.h+'cm. 외형 정보: '+(spec.desc||'없음')+' '+rules });
  const mkBody=(ct)=>JSON.stringify({ model:'claude-sonnet-5', max_tokens:4000, messages:[{ role:'user', content:ct }] });
  const ep = aiEndpoint();
  const call=(bodyStr)=>fetch(ep.url, { method:'POST', headers:ep.headers, body:bodyStr });
  const attempt=async(ct)=>{
    let res=await call(mkBody(ct));
    if(!res.ok && spec.image){ res=await call(mkBody(ct.filter(c=>c.type==='text'))); }
    if(!res.ok){ let msg='모델 생성 실패 ('+res.status+')';
      try{ const e=await res.json(); if(e&&e.error&&e.error.message) msg=e.error.message; }catch(_){}
      throw new Error(msg); }
    const data=await res.json();
    const texts=(data.content||[]).filter(blk=>blk.type==='text').map(blk=>blk.text).join(' ');
    const i1=texts.indexOf('<model>'), i2=texts.indexOf('</model>');
    if(i1<0||i2<=i1) return null;
    let code=texts.slice(i1+7, i2).trim();
    code=code.replace(/^```[a-z]*\s*/i,'').replace(/```\s*$/,'');
    return code;
  };
  let code=await attempt(content);
  if(!code){
    const strict=content.map(c=>c.type==='text'?{ type:'text', text:c.text+' 설명·사과·주석 없이 <model>코드</model>만 즉시 출력해.' }:c);
    code=await attempt(strict);
  }
  if(!code) throw new Error('생성된 모델 코드를 찾지 못했어요');
  return code;
}

/* ─── AR marker config (js-aruco2, ARUCO_MIP_36h12 dictionary) ─── */
const DICT = 'ARUCO_MIP_36h12';
const MARKER_MM = 100;            // printed marker side length (10cm)
const TARGETS = [                 // marker id → room corner
  { id: 0, label: 'A', pos: '좌측 앞' },
  { id: 1, label: 'B', pos: '우측 앞' },
  { id: 2, label: 'C', pos: '좌측 뒤' },
  { id: 3, label: 'D', pos: '우측 뒤' },
];
const medianVec = (list) => {
  if (!list.length) return null;
  const at = i => { const s=list.map(v=>v[i]).sort((a,b)=>a-b); return s[s.length>>1]; };
  return [at(0), at(1), at(2)];
};
const dist3 = (a,b) => Math.hypot(a[0]-b[0], a[1]-b[1], a[2]-b[2]);

/* ─── camera calibration: focal length from a marker's homography (Zhang single-view) ─── */
function solveLinear(M, b, n){
  const A = M.map((r,i)=>r.concat(b[i]));
  for(let col=0; col<n; col++){
    let piv=col; for(let r=col+1;r<n;r++) if(Math.abs(A[r][col])>Math.abs(A[piv][col])) piv=r;
    if(Math.abs(A[piv][col])<1e-12) return null;
    [A[col],A[piv]]=[A[piv],A[col]];
    for(let r=0;r<n;r++){ if(r===col) continue; const f=A[r][col]/A[col][col];
      for(let k=col;k<=n;k++) A[r][k]-=f*A[col][k]; }
  }
  const x=new Array(n); for(let i=0;i<n;i++) x[i]=A[i][n]/A[i][i]; return x;
}
// homography mapping a unit square (0,0)(1,0)(1,1)(0,1) → the 4 image corners
function homographyUnitSquareTo(pts){
  const sq=[[0,0],[1,0],[1,1],[0,1]], M=[], b=[];
  for(let i=0;i<4;i++){ const [X,Y]=sq[i], [u,v]=pts[i];
    M.push([X,Y,1,0,0,0,-u*X,-u*Y]); b.push(u);
    M.push([0,0,0,X,Y,1,-v*X,-v*Y]); b.push(v);
  }
  const h=solveLinear(M,b,8); if(!h) return null;
  return [h[0],h[1],h[2],h[3],h[4],h[5],h[6],h[7],1];
}
// focal-length candidates (px) from one square marker, principal point (cx,cy), square pixels
function focalsFromMarker(corners, cx, cy){
  const H=homographyUnitSquareTo(corners.map(c=>[c.x,c.y])); if(!H) return [];
  const h1=[H[0],H[3],H[6]], h2=[H[1],H[4],H[7]], c1=H[6], c2=H[7];
  const P=(a,b)=> a[0]*b[0]+a[1]*b[1]-cx*(a[0]*b[2]+b[0]*a[2])-cy*(a[1]*b[2]+b[1]*a[2])+(cx*cx+cy*cy)*a[2]*b[2];
  const out=[];
  const P12=P(h1,h2); if(Math.abs(P12)>1e-9){ const w=-(c1*c2)/P12; if(w>0) out.push(1/Math.sqrt(w)); }
  const dP=P(h1,h1)-P(h2,h2); if(Math.abs(dP)>1e-9){ const w=-(c1*c1-c2*c2)/dP; if(w>0) out.push(1/Math.sqrt(w)); }
  return out;
}

/* ─── marker prep screen: generate + print real ArUco markers ─── */
function MarkerScreen({ printed, onPrinted, onNext }) {
  const markers = React.useMemo(() => {
    if (typeof AR === 'undefined' || !AR.Dictionary) return TARGETS.map(t=>({...t, svg:null}));
    const dict = new AR.Dictionary(DICT);
    return TARGETS.map(t => ({ ...t, svg: dict.generateSVG(t.id) }));
  }, []);

  const printMarkers = () => {
    // js-aruco2 SVG는 10x10 단위 뷰박스에 8x8 검은 마커(둘레 1모듈 흰 여백)를 그림.
    // 검은 마커(실제 인식 대상, MARKER_MM=100)를 100mm로 만들려면 컨테이너를 100*10/8 = 125mm로.
    const boxMM = Math.round(MARKER_MM * 10 / 8);
    const blocks = markers.map(m => `
      <div style="page-break-after:always;text-align:center;padding-top:40px;font-family:sans-serif">
        <div style="width:${boxMM}mm;height:${boxMM}mm;margin:0 auto">${m.svg||''}</div>
        <div style="margin-top:8mm;font-size:20pt;font-weight:700">마커 ${m.label} · ${m.pos} (ID ${m.id})</div>
        <div style="margin-top:2mm;font-size:11pt;color:#555">검은 마커 한 변 ${MARKER_MM}mm (흰 여백 포함 ${boxMM}mm) · A4 배율 100%로 인쇄하세요</div>
      </div>`).join('');
    const w = window.open('', '_blank');
    if (!w) { alert('팝업이 차단되었습니다. 팝업을 허용해 주세요.'); return; }
    w.document.write(`<html><head><title>RoomTetris 마커</title></head><body>${blocks}</body></html>`);
    w.document.close(); onPrinted();
    setTimeout(()=>{ w.focus(); w.print(); }, 300);
  };

  return (
    <Device footer={<div style={{display:'flex',flexDirection:'column',gap:10}}>
        <Btn variant="outlined" onClick={printMarkers}>{printed?'마커 인쇄 열림 ✓':'마커 4장 인쇄'}</Btn>
        <Btn onClick={onNext}>스캔 시작</Btn>
      </div>}>
      <H title="마커 준비" sub="마커 4장을 인쇄해 방 네 모서리 바닥에 붙여주세요." />
      <Scroll>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:16 }}>
          {markers.map(m=>(
            <div key={m.id} style={{ background:'#fff', borderRadius:16, padding:16, textAlign:'center' }}>
              <div style={{ width:'100%', aspectRatio:'1', borderRadius:10, background:'#fff',
                border:'1px solid var(--line)', padding:10, marginBottom:10 }}
                dangerouslySetInnerHTML={{ __html: m.svg ||
                  '<div style="width:100%;height:100%;background:repeating-conic-gradient(#111 0 25%,#fff 0 50%) 0 0/33% 33%"></div>' }} />
              <Type v="body2" weight="bold">마커 {m.label} · {m.pos}</Type>
              <Type v="caption" color="var(--muted)" style={{marginTop:2}}>ID {m.id}</Type>
            </div>
          ))}
        </div>
        <SectionMessage title="실제 크기로 인쇄하세요">A4 용지, 배율 100% (마커 한 변 10cm). 크기가 다르면 측정 오차가 커집니다. 마커는 ARUCO_MIP_36h12 사전을 사용합니다.</SectionMessage>
      </Scroll>
    </Device>
  );
}

/* ─── live camera + marker measurement screen ─── */
const CW = 360, CH = 640, NEED = 14;   // processing size, samples per marker
function ScanScreen({ onMeasured, onBack, onManual }) {
  const videoRef = useRef(null), canvasRef = useRef(null);
  const rafRef = useRef(0), streamRef = useRef(null), doneRef = useRef(false);
  const samples = useRef({0:[],1:[],2:[],3:[]}), wHist = useRef([]), dHist = useRef([]);
  const fBuf = useRef([]), lastSizeRef = useRef(null);
  const [err, setErr] = useState(null);
  const [ui, setUi] = useState({ seen:[], progress:0, w:null, d:null, ready:false, fEff:null, fSource:'default' });

  // calibration state (persisted per device)
  const loadCal = () => { try {
    const mf = Number(localStorage.getItem('rt_calManualF')); const sc = Number(localStorage.getItem('rt_calScale'));
    return { manualF: mf>0 ? mf : null, scale: sc>0 ? sc : 1 };
  } catch(e){ return { manualF:null, scale:1 }; } };
  const [cal, setCal] = useState(loadCal);
  const calRef = useRef({ manualF:cal.manualF, scale:cal.scale, fAuto:null });
  useEffect(()=>{ calRef.current.manualF=cal.manualF; calRef.current.scale=cal.scale;
    try { if(cal.manualF) localStorage.setItem('rt_calManualF', String(Math.round(cal.manualF))); else localStorage.removeItem('rt_calManualF');
      localStorage.setItem('rt_calScale', String(cal.scale)); } catch(e){} }, [cal]);
  const [showCal, setShowCal] = useState(false);
  const [calDist, setCalDist] = useState('');
  const doDistanceCal = () => { const D=parseFloat(calDist), px=lastSizeRef.current;
    if(!D||!px) return; setCal(c=>({ ...c, manualF: px*(D*10)/MARKER_MM })); };
  const resetCal = () => { setCal({ manualF:null, scale:1 }); fBuf.current=[]; };

  useEffect(() => {
    let stopped = false;
    const hasAR = typeof AR !== 'undefined' && typeof POS !== 'undefined';
    if (!hasAR) { setErr('lib'); return; }
    const detector = new AR.Detector({ dictionaryName: DICT });
    const canvas = canvasRef.current, ctx = canvas.getContext('2d');
    canvas.width = CW; canvas.height = CH;
    const cx = CW/2, cy = CH/2;
    let seedF = calRef.current.manualF || CW;
    let posit = new POS.Posit(MARKER_MM, seedF), lastF = seedF;

    navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ ideal:'environment' } }, audio:false })
      .then(stream => {
        if (stopped) { stream.getTracks().forEach(t=>t.stop()); return; }
        streamRef.current = stream;
        const v = videoRef.current; v.srcObject = stream; v.play();
        rafRef.current = requestAnimationFrame(loop);
      })
      .catch(() => setErr('perm'));

    function coverDraw(v) {
      const vw=v.videoWidth, vh=v.videoHeight; if(!vw||!vh) return false;
      const scale=Math.max(CW/vw, CH/vh), sw=CW/scale, sh=CH/scale;
      ctx.drawImage(v, (vw-sw)/2, (vh-sh)/2, sw, sh, 0,0, CW,CH);
      return true;
    }
    function median(a){ const s=[...a].sort((x,y)=>x-y); return s[s.length>>1]; }
    function loop() {
      rafRef.current = requestAnimationFrame(loop);
      const v = videoRef.current;
      if (!v || v.readyState !== v.HAVE_ENOUGH_DATA) return;
      if (!coverDraw(v)) return;
      const img = ctx.getImageData(0,0,CW,CH);
      const markers = detector.detect(img);
      const seen = [], dets = [];
      let biggest = 0;
      for (const m of markers) {
        const t = TARGETS.find(x=>x.id===m.id); if(!t) continue;
        seen.push(m.id); dets.push(m);
        ctx.lineWidth=3; ctx.strokeStyle='#3DFF7E'; ctx.beginPath();
        m.corners.forEach((c,j)=>{ const n=m.corners[(j+1)%4]; ctx.moveTo(c.x,c.y); ctx.lineTo(n.x,n.y); });
        ctx.stroke();
        ctx.fillStyle='#3DFF7E'; ctx.font='bold 20px sans-serif';
        ctx.fillText(t.label, m.corners[0].x, m.corners[0].y-6);
        // mean projected side length (px) — for manual distance calibration
        let side=0; for(let j=0;j<4;j++){ const a=m.corners[j], b=m.corners[(j+1)%4]; side+=Math.hypot(a.x-b.x,a.y-b.y); } side/=4;
        if(side>biggest){ biggest=side; lastSizeRef.current=side; }
        // auto focal-length estimate from marker homography
        for (const f of focalsFromMarker(m.corners, cx, cy)) if (f>CW*0.3 && f<CW*6){ fBuf.current.push(f); if(fBuf.current.length>60) fBuf.current.shift(); }
      }
      // effective focal length: manual base (if calibrated) or auto estimate, × fine-tune scale
      const fAuto = fBuf.current.length>=10 ? median(fBuf.current) : null;
      calRef.current.fAuto = fAuto;
      const baseF = calRef.current.manualF || fAuto || CW;
      const effF = baseF * (calRef.current.scale||1);
      if (Math.abs(effF-lastF)/lastF > 0.01) { posit = new POS.Posit(MARKER_MM, effF); lastF = effF; }
      for (const m of dets) {
        const cs = m.corners.map(c=>({ x:c.x-cx, y:cy-c.y }));
        const pose = posit.pose(cs);
        if (pose && pose.bestTranslation) {
          const buf = samples.current[m.id];
          buf.push(pose.bestTranslation); if (buf.length>NEED*2) buf.shift();
        }
      }
      const med = id => medianVec(samples.current[id]);
      const have = TARGETS.every(t=>samples.current[t.id].length>0);
      if (have) {
        const A=med(0),B=med(1),C=med(2),D=med(3);
        const w=(dist3(A,B)+dist3(C,D))/2/10, d=(dist3(A,C)+dist3(B,D))/2/10;
        if (isFinite(w)&&isFinite(d)) { wHist.current.push(w); dHist.current.push(d);
          if(wHist.current.length>20){wHist.current.shift();dHist.current.shift();} }
      }
      const filled = TARGETS.reduce((a,t)=>a+Math.min(samples.current[t.id].length,NEED),0);
      const progress = Math.round(filled/(NEED*4)*100);
      const wMed = wHist.current.length ? median(wHist.current) : null;
      const dMed = dHist.current.length ? median(dHist.current) : null;
      const hasF = calRef.current.manualF!=null || fAuto!=null;
      const ready = progress>=100 && wMed!=null && hasF;
      if (ready && !doneRef.current) doneRef.current = true;
      setUi({ seen, progress, w:wMed, d:dMed, ready, fEff:Math.round(effF),
        fSource: calRef.current.manualF!=null ? 'manual' : (fAuto!=null?'auto':'default') });
    }

    return () => {
      stopped = true; cancelAnimationFrame(rafRef.current);
      if (streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
    };
  }, []);

  const finish = () => {
    const w = Math.max(100, Math.min(1000, Math.round(ui.w)));
    const d = Math.max(100, Math.min(1000, Math.round(ui.d)));
    const arr = wHist.current, m = arr.length ? [...arr].sort((a,b)=>a-b)[arr.length>>1] : w;
    const mad = arr.length ? [...arr].map(x=>Math.abs(x-m)).sort((a,b)=>a-b)[arr.length>>1] : 1.2;
    onMeasured(w, d, Math.max(0.5, Math.min(5, mad || 1.2)));
  };

  const seenSet = new Set(ui.seen);

  return (
    <Device dark footer={
      err ? <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <Btn onClick={onManual}>치수 직접 입력</Btn>
          <Btn variant="ghost" onClick={onBack}>마커 준비로 돌아가기</Btn>
        </div>
      : <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <Btn disabled={!ui.ready} onClick={finish}>
            {ui.ready ? `측정 결과 보기 · ${(ui.w/100).toFixed(2)}m × ${(ui.d/100).toFixed(2)}m` : '마커 4개를 모두 비춰주세요'}
          </Btn>
          <Btn variant="ghost" onClick={onManual}>카메라 없이 치수 직접 입력</Btn>
        </div>}>
      <div style={{ position:'relative', height:'100%', marginTop:'calc(-1 * var(--sb))', paddingTop:'var(--sb)', background:'#0a0d12' }}>
        <video ref={videoRef} playsInline muted style={{ display:'none' }} />
        <canvas ref={canvasRef} style={{ position:'absolute', inset:'var(--sb) 0 0', width:'100%', height:'calc(100% - var(--sb))',
          objectFit:'cover', background:'#0a0d12' }} />

        {err && (
          <div style={{ position:'absolute', inset:'var(--sb) 20px 0', display:'flex', flexDirection:'column',
            alignItems:'center', justifyContent:'center', textAlign:'center', gap:10 }}>
            <div style={{ fontSize:40 }}>📷</div>
            <Type v="title3" weight="bold" color="#fff">{err==='lib'?'마커 라이브러리 로드 실패':'카메라를 사용할 수 없어요'}</Type>
            <Type v="body2" color="rgba(255,255,255,0.7)">
              {err==='lib' ? '인터넷 연결을 확인하거나 기본 치수로 진행하세요.'
                : '브라우저에서 카메라 권한을 허용해야 실측이 가능합니다. HTTPS 또는 localhost에서 열어주세요.'}
            </Type>
          </div>
        )}

        {!err && (
          <Fragment>
            {/* calibration button */}
            <button onClick={()=>setShowCal(s=>!s)} style={{ position:'absolute', top:'calc(var(--sb) + 12px)', right:14, zIndex:8,
              border:'none', cursor:'pointer', background:'rgba(255,255,255,0.16)', backdropFilter:'blur(10px)',
              color:'#fff', borderRadius:99, padding:'6px 12px', fontSize:12, fontWeight:700, fontFamily:'inherit' }}>
              ⚙ 보정{ui.fEff?` f≈${ui.fEff}`:''}
            </button>
            {showCal && (
              <div style={{ position:'absolute', left:16, right:16, bottom:16, zIndex:9,
                background:'rgba(18,22,29,0.96)', backdropFilter:'blur(14px)', borderRadius:18, padding:16,
                border:'1px solid rgba(255,255,255,0.12)', boxShadow:'0 18px 44px rgba(0,0,0,.5)', animation:'fadein .25s ease both' }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
                  <Type v="body" weight="bold" color="#fff">카메라 보정</Type>
                  <button onClick={()=>setShowCal(false)} style={{ border:'none', background:'none', color:'rgba(255,255,255,0.6)', fontSize:20, cursor:'pointer', lineHeight:1 }}>×</button>
                </div>
                <Type v="caption" color="rgba(255,255,255,0.6)">초점거리 f ≈ {ui.fEff||'—'}px · {ui.fSource==='manual'?'수동 보정':ui.fSource==='auto'?'자동 추정':'기본값'}</Type>
                <div style={{ marginTop:14 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:5 }}>
                    <Type v="caption" color="rgba(255,255,255,0.7)">미세보정 (측정값 스케일)</Type>
                    <Type v="caption" color="#fff">{Math.round((cal.scale||1)*100)}%</Type>
                  </div>
                  <input type="range" min="0.85" max="1.15" step="0.01" value={cal.scale||1}
                    onChange={e=>setCal(c=>({...c, scale:Number(e.target.value)}))} style={{width:'100%'}} />
                </div>
                <div style={{ marginTop:14, display:'flex', gap:8, alignItems:'center' }}>
                  <input type="number" inputMode="decimal" placeholder="마커까지 거리 (cm)" value={calDist}
                    onChange={e=>setCalDist(e.target.value)}
                    style={{ flex:1, minWidth:0, background:'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.15)',
                      borderRadius:10, padding:'9px 12px', color:'#fff', fontFamily:'inherit', fontSize:14 }} />
                  <Btn size="small" full={false} onClick={doDistanceCal} style={{padding:'9px 14px', whiteSpace:'nowrap'}}>기준거리 보정</Btn>
                </div>
                <div style={{ display:'flex', gap:8, marginTop:10 }}>
                  <Btn size="small" variant="ghost" full={false} onClick={resetCal} style={{padding:'8px 12px'}}>초기화</Btn>
                </div>
                <Type v="caption" color="rgba(255,255,255,0.5)" style={{marginTop:12, lineHeight:1.5}}>

                </Type>
              </div>
            )}
            <div style={{ position:'absolute', inset:'calc(var(--sb) + 20px) 24px 150px', border:'2px dashed rgba(255,255,255,0.25)',
              borderRadius:12, pointerEvents:'none' }} />
            <div style={{ position:'absolute', top:'calc(var(--sb) + 12px)', left:0, right:0, display:'flex', justifyContent:'center', gap:8 }}>
              {TARGETS.map(t=>{ const on=seenSet.has(t.id); return (
                <div key={t.id} style={{ display:'flex', alignItems:'center', gap:5, padding:'6px 11px', borderRadius:99,
                  background:on?'#3DFF7E':'rgba(255,255,255,0.12)', color:on?'#0a0d12':'#fff',

              ); })}
            </div>
            {ui.w!=null && (
              <div style={{ position:'absolute', top:'calc(var(--sb) + 58px)', left:0, right:0, textAlign:'center' }}>
                <div style={{ display:'inline-block', background:'rgba(0,0,0,0.45)', backdropFilter:'blur(8px)',
                  borderRadius:12, padding:'8px 16px' }}>
                  <Type v="title3" weight="bold" color="#fff">{(ui.w/100).toFixed(2)}m × {(ui.d/100).toFixed(2)}m</Type>
                </div>
              </div>
            )}
            <div style={{ position:'absolute', left:0, right:0, bottom:20, padding:'0 24px', textAlign:'center' }}>
              <div style={{ display:'inline-flex', alignItems:'center', gap:8, background:'rgba(255,255,255,0.12)',
                backdropFilter:'blur(10px)', borderRadius:99, padding:'8px 16px', marginBottom:14 }}>
                <span style={{ width:8, height:8, borderRadius:'50%', background: ui.ready?'#3DFF7E':'#FFC53D' }} />
                <Type v="body2" weight="bold" color="#fff">
                  {ui.ready ? '측정 완료 — 안정화됨' : ui.seen.length<4 ? '마커 4개를 한 화면에 담아주세요' : '방을 천천히 비춰 정밀도를 높여주세요'}
                </Type>

        ctx.lineWidth=3; ctx.strokeStyle='#3DFF7E'; ctx.beginPath(); m.corners.forEach((c,j)=>{const q=m.corners[(j+1)%4];ctx.moveTo(c.x,c.y);ctx.lineTo(q.x,q.y);}); ctx.stroke();
        ctx.fillStyle='#3DFF7E'; ctx.font='bold 20px sans-serif'; ctx.fillText(String(m.id+1), m.corners[0].x, m.corners[0].y-6);
        let side=0; for(let j=0;j<4;j++){ const a=m.corners[j], b=m.corners[(j+1)%4]; side+=Math.hypot(a.x-b.x,a.y-b.y); } side/=4; if(side>biggest){ biggest=side; lastSizeRef.current=side; }
        for(const f of focalsFromMarker(m.corners,cx,cy)) if(f>CW*0.3&&f<CW*6){ fBuf.current.push(f); if(fBuf.current.length>60)fBuf.current.shift(); }
      }
      const calF=calRef.current.manualF||0;
      const fAuto=(!calF && fBuf.current.length>=10)?median(fBuf.current):null;
      const effF=calF||fAuto||CW;
      if(Math.abs(effF-lastF)/lastF>0.01){ posit=new POS.Posit(MARKER_MM,effF); lastF=effF; }
      for(const m of markers){ if(m.id<0||m.id>=N)continue; const cs=m.corners.map(c=>({x:c.x-cx,y:cy-c.y})); const pose=posit.pose(cs);
        if(pose&&pose.bestTranslation){ if(!samples.current[m.id])samples.current[m.id]=[]; const buf=samples.current[m.id]; buf.push(pose.bestTranslation); if(buf.length>POLY_NEED*2)buf.shift(); } }
      const haveAll=[...Array(N).keys()].every(i=>samples.current[i]&&samples.current[i].length>0);
      const filled=[...Array(N).keys()].reduce((a,i)=>a+Math.min((samples.current[i]||[]).length,POLY_NEED),0);
      const progress=Math.round(filled/(POLY_NEED*N)*100);
      let area=null; const scl=calRef.current.scale||1;
      if(haveAll){ const P=[...Array(N).keys()].map(i=>medVec(samples.current[i])); const poly2=_polyFromPositions(P);
        let s=0; for(let i=0;i<poly2.length;i++){ const a=poly2[i], b=poly2[(i+1)%poly2.length]; s+=a[0]*b[1]-b[0]*a[1]; } area=Math.abs(s)/2/1e6*scl*scl; }
      const ready=progress>=100 && haveAll && (calF>0||fAuto!=null);
      if(ready&&!doneRef.current)doneRef.current=true;
      setUi({ seen, progress, ready, area, fEff:Math.round(effF), fSource: calF>0?'manual':(fAuto!=null?'auto':'default') });
    }
    return ()=>{ stopped=true; cancelAnimationFrame(rafRef.current); if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop()); };
  },[]);
  const finish=()=>{ const N=count; if(![...Array(N).keys()].every(i=>samples.current[i]&&samples.current[i].length))return;
    const medVec=list=>{const at=i=>{const s=list.map(v=>v[i]).sort((a,b)=>a-b);return s[s.length>>1];};return [at(0),at(1),at(2)];};
    const sc=calRef.current.scale||1;
    const P=[...Array(N).keys()].map(i=>medVec(samples.current[i])); const poly2=_polyFromPositions(P);
    const xs=poly2.map(p=>p[0]), zs=poly2.map(p=>p[1]); const minX=Math.min(...xs), minZ=Math.min(...zs);
    const outlineCm=poly2.map(p=>[Math.round((p[0]-minX)/10*sc), Math.round((p[1]-minZ)/10*sc)]);
    const bboxW=Math.round((Math.max(...xs)-minX)/10*sc), bboxD=Math.round((Math.max(...zs)-minZ)/10*sc);
    onDone(outlineCm, bboxW, bboxD); };
  const seenSet=new Set(ui.seen);
  return (

          <Btn variant="ghost" onClick={onManual}>카메라 없이 직접 그리기</Btn>

          </div>

        {!err && (

              <div style={{ position:'absolute', left:0, right:0, top:0, height:'20%',
                background:'linear-gradient(180deg, rgba(61,255,126,0) 0%, rgba(61,255,126,0.12) 78%, rgba(61,255,126,0.45) 100%)',

            <div style={{ position:'absolute', top:'calc(var(--sb) + 10px)', left:12, right:12, zIndex:6, display:'flex', alignItems:'center', justifyContent:'space-between', gap:8 }}>
              <div style={{ display:'flex', alignItems:'center', gap:6, background:'rgba(255,255,255,0.14)', backdropFilter:'blur(10px)', borderRadius:99, padding:'5px 8px' }}>
                <Type v="caption" weight="bold" color="#fff">모서리</Type>

/* ─── polygon room measurement (tap points → outline, area, calibration) ─── */
function PolygonMeasure({ onDone, onBack }){
  const [points,setPoints]=useState([]);
  const [closed,setClosed]=useState(false);
  const [angleSnap,setAngleSnap]=useState(true);
  const [hover,setHover]=useState(null);
  const [dragIdx,setDragIdx]=useState(null);
  const [selWall,setSelWall]=useState(null);
  const [calib,setCalib]=useState('');
  const svgRef=useRef(null);
  const n=points.length;
  const valid=closed?_pmSimple(points):true;
  const wallCount=closed?n:Math.max(0,n-1);
  const segs=[]; for(let i=0;i<wallCount;i++) segs.push({i,a:points[i],b:points[(i+1)%n]});
  const perimeter=segs.reduce((s,w)=>s+_pmDist(w.a,w.b),0);
  const area=closed&&valid&&n>=3?_pmShoelace(points):null;
  const cen=_pmCentroid(points);
  let rubber=null, rubberClose=false, rubberCross=false;
  if(!closed&&hover&&n>0&&dragIdx===null){ const last=points[n-1];
    if(n>=3&&_pmDist(hover,points[0])<0.32){ rubber=points[0]; rubberClose=true; rubberCross=_pmCrosses(last,points[0],points,[0,n-2]); }
    else { rubber=_pmSnap(_pmClampW(hover),last,angleSnap); rubberCross=_pmCrosses(last,rubber,points,[n-2]); } }
  const getPt=(e)=>{ const svg=svgRef.current; if(!svg) return null; const pt=svg.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY;
    const m=svg.getScreenCTM(); if(!m) return null; const p=pt.matrixTransform(m.inverse()); return {x:p.x,z:p.y}; };
  const hitMarker=(p)=>{ for(let i=points.length-1;i>=0;i--) if(_pmDist(p,points[i])<0.28) return i; return -1; };
  const onDown=(e)=>{ const raw=getPt(e); if(!raw) return; const mi=hitMarker(raw);
    if(mi>=0){ if(!closed&&mi===0&&n>=3){ if(!_pmCrosses(points[n-1],points[0],points,[0,n-2])){ setClosed(true); setHover(null); } return; }
      setDragIdx(mi); setSelWall(null); try{svgRef.current.setPointerCapture(e.pointerId);}catch(_){} return; }
    if(closed){ let best=-1, bd=0.25; for(let i=0;i<n;i++){ const d=_distToSeg(raw,points[i],points[(i+1)%n]); if(d<bd){bd=d;best=i;} }
      setSelWall(best>=0?best:null); if(best>=0) setCalib(_pmDist(points[best],points[(best+1)%n]).toFixed(2)); return; }
    const prev=n>0?points[n-1]:null; const p=_pmSnap(_pmClampW(raw),prev,angleSnap);
    if(prev&&_pmDist(p,prev)<0.05) return; if(prev&&_pmCrosses(prev,p,points,[n-2])) return; setPoints([...points,p]); };
  function _distToSeg(p,a,b){ const abx=b.x-a.x, abz=b.z-a.z, l2=abx*abx+abz*abz||1;
    const t=Math.max(0,Math.min(1,((p.x-a.x)*abx+(p.z-a.z)*abz)/l2)); return Math.hypot(p.x-(a.x+abx*t), p.z-(a.z+abz*t)); }
  const onMove=(e)=>{ const raw=getPt(e); if(!raw) return;
    if(dragIdx!==null){ const p=_pmClampW({x:Math.round(raw.x/0.05)*0.05, z:Math.round(raw.z/0.05)*0.05});
      setPoints(pts=>pts.map((q,i)=>i===dragIdx?p:q)); return; }
    if(!closed) setHover(raw); };
  const onUp=()=>setDragIdx(null);
  const undo=()=>{ if(closed){ setClosed(false); setSelWall(null); return; } if(n>0) setPoints(points.slice(0,-1)); };
  const reset=()=>{ setPoints([]); setClosed(false); setSelWall(null); setHover(null); };
  const PM_EXAMPLES=[
    {n:'원룸 3.3×3.0', pts:[{x:1,z:1},{x:4.3,z:1},{x:4.3,z:4},{x:1,z:4}]},
    {n:'침실 4.0×3.0', pts:[{x:1,z:1},{x:5,z:1},{x:5,z:4},{x:1,z:4}]},
    {n:'거실 4.5×4.0', pts:[{x:1,z:1},{x:5.5,z:1},{x:5.5,z:5},{x:1,z:5}]},
    {n:'ㄱ자 5.2×4.4', pts:[{x:1,z:1},{x:6.2,z:1},{x:6.2,z:4},{x:4.6,z:4},{x:4.6,z:5.4},{x:1,z:5.4}]},
  ];
  const loadPreset=(pts)=>{ setPoints(pts.map(p=>({...p}))); setClosed(true); setSelWall(null); setHover(null); };
  const applyCalib=()=>{ const v=parseFloat(calib); if(!(v>0)||selWall===null||n<2) return;
    const cur=_pmDist(points[selWall],points[(selWall+1)%n]); if(cur<1e-6) return; const f=Math.min(5,Math.max(0.2,v/cur));
    setPoints(pts=>pts.map(p=>({x:Math.round((cen.x+(p.x-cen.x)*f)*1000)/1000, z:Math.round((cen.z+(p.z-cen.z)*f)*1000)/1000}))); };
  const finish=()=>{ if(!(closed&&valid&&n>=3)) return;
    const xs=points.map(p=>p.x), zs=points.map(p=>p.z); const minX=Math.min(...xs), minZ=Math.min(...zs);
    const outlineCm=points.map(p=>[Math.round((p.x-minX)*100), Math.round((p.z-minZ)*100)]);
    const bboxW=Math.round((Math.max(...xs)-minX)*100), bboxD=Math.round((Math.max(...zs)-minZ)*100);
    onDone(outlineCm, bboxW, bboxD); };
  const dimLabels=segs.map(w=>{ const mx=(w.a.x+w.b.x)/2, mz=(w.a.z+w.b.z)/2, len=_pmDist(w.a,w.b);
    let nx=-(w.b.z-w.a.z)/(len||1), nz=(w.b.x-w.a.x)/(len||1);
    if(Math.hypot(mx+nx*0.1-cen.x,mz+nz*0.1-cen.z)<Math.hypot(mx-cen.x,mz-cen.z)){ nx=-nx; nz=-nz; }
    return {i:w.i, x:mx+nx*0.34, z:mz+nz*0.34, len}; });
  const mono='ui-monospace, Menlo, Consolas, monospace';
  const btn={ fontFamily:'inherit', fontSize:12.5, fontWeight:700, cursor:'pointer', background:'#fff', color:'#374151',
    border:'1px solid rgba(17,24,39,0.12)', borderRadius:99, padding:'7px 12px',
    transition:'background .15s, color .15s, box-shadow .15s', boxShadow:'0 1px 3px rgba(16,24,40,.05)' };
  return (
    <Device footer={
      <div style={{display:'flex', gap:10}}>
        <Btn variant="outlined" full={false} onClick={onBack} style={{padding:'14px 16px'}}>뒤로</Btn>
        <Btn disabled={!(closed&&valid&&n>=3)} onClick={finish} style={{flex:1}}>이 방으로 시작{area!=null?` · ${area.toFixed(1)}㎡`:''}</Btn>
      </div>}>
      <div style={{ position:'relative', height:'100%', marginTop:'calc(-1 * var(--sb))', paddingTop:'var(--sb)', background:PM_C.page,
        display:'flex', flexDirection:'column' }}>
        <div style={{ padding:'6px 20px 0' }}>
          <button onClick={onBack} style={{ border:'none', background:'none', cursor:'pointer', padding:0, color:'var(--accent)', fontWeight:700, fontSize:14, fontFamily:'inherit' }}>← 뒤로</button>
        </div>
        <div style={{ padding:'2px 20px 12px' }}>
          <Type v="title2" weight="bold" style={{letterSpacing:-0.5}}>다각형 방 측정</Type>
          <Type v="body2" color="var(--muted)" style={{marginTop:4}}>격자를 탭해 방 모서리마다 측점을 찍고, 첫 점을 다시 탭하면 닫혀요.</Type>
        </div>
        <div className="no-sb" style={{ display:'flex', gap:8, overflowX:'auto', padding:'0 20px 10px', alignItems:'center' }}>
          <span style={{ flexShrink:0, fontSize:12, fontWeight:700, color:'var(--muted)', marginRight:2 }}>방 크기 예시</span>
          {PM_EXAMPLES.map(ex=>(
            <button key={ex.n} onClick={()=>loadPreset(ex.pts)} style={{ flexShrink:0, fontFamily:'inherit', fontSize:13,
              fontWeight:600, cursor:'pointer', background:'#fff', color:'#374151', border:'none',
              boxShadow:'inset 0 0 0 1px var(--line), 0 1px 3px rgba(16,24,40,.05)',
              borderRadius:99, padding:'7px 13px', whiteSpace:'nowrap' }}>{ex.n}</button>
          ))}
        </div>
        <div style={{ flex:1, position:'relative', minHeight:0, margin:'0 16px', background:'#fff', borderRadius:18,
          boxShadow:'var(--card)', border:'1px solid rgba(17,24,39,.04)', overflow:'hidden' }}>
          <svg ref={svgRef} viewBox="-0.7 -0.7 11.4 8.4"
            style={{ position:'absolute', inset:0, width:'100%', height:'100%', touchAction:'none', cursor:closed?'default':'crosshair' }}
            onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp} onPointerLeave={()=>setHover(null)}>
            <defs><pattern id="pmg" width="1" height="1" patternUnits="userSpaceOnUse">
              <path d="M 0.5 0 V 1 M 0 0.5 H 1" stroke="#EDF1F6" strokeWidth="0.015" fill="none"/>
              <path d="M 1 0 V 1 M 0 1 H 1" stroke="#DFE6EE" strokeWidth="0.02" fill="none"/></pattern></defs>
            <rect x="0" y="0" width="10" height="7" rx="0.12" fill="#FAFBFD" stroke={PM_C.hair} strokeWidth="0.03"/>
            <rect x="0" y="0" width="10" height="7" fill="url(#pmg)"/>
            {closed&&n>=3&&<polygon points={points.map(p=>`${p.x},${p.z}`).join(' ')} fill={valid?'rgba(0,102,255,0.07)':'rgba(255,66,66,0.10)'}/>}
            {segs.map(w=><line key={w.i} x1={w.a.x} y1={w.a.z} x2={w.b.x} y2={w.b.z}

            </div>

        </div>
      </div>
    </Device>
  );
}

    const out = {};
    for (const f of allFurn) {
      if (f.meshUrl) { const fid=f.id, fw=f.w, fd=f.d, fh=f.h;
        loadMeshModel(f.meshUrl).then(src=>{
          let r2=null;
          try{
            r2=new THREE.WebGLRenderer({ alpha:true, antialias:true, preserveDrawingBuffer:true });
            const scene=new THREE.Scene(); _lights(scene);
            scene.add(_fitModelToDims(src.clone(true), fw, fd, fh));
            const maxd=Math.max(fw,fd,fh), dist=maxd*2.05;
            const cam=new THREE.PerspectiveCamera(32,1,1,10000);
            cam.position.set(dist*0.72, fh/2+dist*0.62, dist*0.9); cam.lookAt(0, fh*0.55, 0);
            r2.setSize(240,240); r2.render(scene,cam);
            const durl=r2.domElement.toDataURL('image/png');
            setThumbs(prev=>({ ...prev, [fid]: durl }));
          }catch(e){}
          if(r2) r2.dispose();
        }).catch(()=>{});
        continue;
      }
      try { out[f.id] = renderThumb(r, f.kind||KIND[f.id]||'box', f.w, f.d, f.h, f.fg, 240, f.modelCode); } catch(e){}
    }
    r.dispose(); setThumbs(out);
  }, [customFurn]);

  const { screen, cat, selId, posX, posY, rotDeg, printed, placements, shared } = st;
  const roomW = st.measuredW ?? 360, roomD = st.measuredD ?? 300, showDims = true;
  const isPoly = !!st.roomOutline;
  const roomPolyCm = st.roomOutline || [[0,0],[roomW,0],[roomW,roomD],[0,roomD]];

  const fitOrient = (w,d) => w<=roomW && d<=roomD && (isPoly || roomW-w>=DOOR || roomD-d>=DOOR);
  const fitsAny = f => fitOrient(f.w,f.d) || fitOrient(f.d,f.w);

  const sel = allFurn.find(f=>f.id===selId) || FURN[0];
  const _rad=(rotDeg||0)*Math.PI/180, _rc=Math.abs(Math.cos(_rad)), _rs=Math.abs(Math.sin(_rad));
  const effW = Math.round(sel.w*_rc + sel.d*_rs);
  const effD = Math.round(sel.w*_rs + sel.d*_rc);
  const posMax = Math.max(0, roomW-effW);
  const posYMax = Math.max(0, roomD-effD);
  const clampedPos = Math.min(posX, posMax);
  const posYc = Math.min(posY, posYMax);
  const rect = { x1:clampedPos, x2:clampedPos+effW, y1:posYc, y2:posYc+effD };
  const _mx=(rect.x1+rect.x2)/2, _mz=(rect.y1+rect.y2)/2;
  const selPoly = _obbCorners(_mx, _mz, sel.w, sel.d, rotDeg||0);
  const collide = placements.find(p=>{ const pcx=p.posX+p.effW/2, pcz=(p.posY??0)+p.effD/2;
    return _polysOverlap(selPoly, _obbCorners(pcx, pcz, p.w??p.effW, p.d??p.effD, p.rot??0)); });
  const _probesRaw = selPoly.concat(selPoly.map((c,i)=>{ const q=selPoly[(i+1)%4]; return [(c[0]+q[0])/2,(c[1]+q[1])/2]; }), [[_mx,_mz]]);
  // pull each probe slightly toward the furniture center so pieces flush against a wall
  // (probe exactly on the polygon edge, where point-in-polygon is unstable) still count as inside
  const _INSET = 1; // cm
  const _probes = _probesRaw.map(([px,pz])=>{ const dx=_mx-px, dz=_mz-pz, d=Math.hypot(dx,dz)||1;
    return [px + dx/d*_INSET, pz + dz/d*_INSET]; });
  const inRoom = _probes.every(([px,pz])=>_pointInPoly(px,pz, roomPolyCm));
  const doorRect = { x1:roomW-DOOR, x2:roomW, y1:roomD-DOOR, y2:roomD };
  const doorHit = !isPoly && _polysOverlap(selPoly,
    [[doorRect.x1,doorRect.y1],[doorRect.x2,doorRect.y1],[doorRect.x2,doorRect.y2],[doorRect.x1,doorRect.y2]]);
  const inDoorBand = !isPoly && rect.y2 > doorRect.y1;
  const gap = isPoly ? 0 : ((inDoorBand ? doorRect.x1 : roomW) - rect.x2);
  const fits = inRoom && !collide && !doorHit;

  const VIEW_W = 354, sc = VIEW_W/roomW;
  const bottomFor = y => 6 + (1 - y/roomD)*30;
  const fpLeft = 12 + clampedPos*sc;
  const fpW = Math.max(40, effW*sc);
  const fpH = Math.max(20, effD*sc*0.42);
  const bodyH = Math.max(24, sel.h*sc*0.7);

  const planW = 280, planH = Math.round(planW*roomD/roomW);

  const cats=['전체','소파','침대','테이블','수납'];
  const items=allFurn.filter(f=>cat==='전체'||f.cat===cat).map(f=>({...f, ok:fitsAny(f)}));

  let verdictTitle, verdictBody, verdictVariant;
  if (fits){ verdictVariant='pos'; verdictTitle='이 위치에 들어가요'; verdictBody = isPoly ? '방 경계 안에 들어가고 겹치는 가구도 없어요.' : ('문·기존 가구와 겹치지 않아요. 옆 여유 '+Math.max(0,Math.round(gap))+'cm.'); }
  else if (!inRoom){ verdictVariant='neg'; verdictTitle='방 밖으로 나가요'; verdictBody='가구가 방 경계를 벗어났어요. 안쪽으로 옮겨보세요.'; }
  else if (collide){ verdictVariant='neg'; verdictTitle='기존 가구와 겹쳐요'; verdictBody=collide.name+' 자리와 겹칩니다. 좌우·앞뒤로 옮기거나 회전해 보세요.'; }
  else { verdictVariant='neg'; verdictTitle='문 개폐 공간과 겹쳐요'; verdictBody=Math.abs(Math.round(gap))+'cm만큼 왼쪽이나 안쪽으로 옮겨보세요.'; }

  const roomWText=(roomW/100).toFixed(1)+'m', roomDText=(roomD/100).toFixed(1)+'m';

  /* ─────────── screens ─────────── */

  if (screen==='intro') return (
    <Device footer={<div style={{display:'flex',flexDirection:'column',gap:10}}>
        <Btn onClick={()=>go('scan')}>시작하기</Btn>
      </div>}>
      <Scroll>
        <div style={{ padding:'24px 0 8px' }}>
          <div style={{ width:64, height:64, borderRadius:18, background:'linear-gradient(150deg, #2c85ff, #0052d6)', display:'flex',
            alignItems:'center', justifyContent:'center', marginBottom:20,
            boxShadow:'0 12px 28px rgba(0,102,255,.35), inset 0 1px 0 rgba(255,255,255,.25)' }}>
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v6H3M15 21v-6h6"/></svg>
          </div>
          <Type v="title1" weight="bold" style={{fontSize:32,lineHeight:'40px',letterSpacing:-0.6}}>가구, 사기 전에<br/>방에 넣어보세요</Type>
          <Type v="body" color="var(--muted)" style={{marginTop:14,lineHeight:'23px'}}>마커 기반 3D 스캔으로 방을 측정하고, 가구가 들어가는지 미리 확인합니다.</Type>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:12, marginTop:26 }}>
          {[{n:1,title:'마커 인쇄 · 배치',desc:'마커 4장을 방 모서리에 붙여요'},
            {n:2,title:'방 스캔',desc:'카메라로 마커를 비추면 치수를 계산해요'},
            {n:3,title:'가구 배치 확인',desc:'AR로 넣어보고 들어가는지 판정해요'}].map(s=>(
            <div key={s.n} style={{ display:'flex', gap:14, alignItems:'center', background:'#fff', borderRadius:16, padding:'16px 16px',
              boxShadow:'var(--card)', border:'1px solid rgba(17,24,39,.04)' }}>
              <div style={{ width:32, height:32, borderRadius:'50%', background:'rgba(0,102,255,0.1)', color:'var(--accent)',
                fontWeight:800, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>{s.n}</div>
              <div>
                <Type v="body" weight="bold">{s.title}</Type>
                <Type v="body2" color="var(--muted)" style={{marginTop:2}}>{s.desc}</Type>
              </div>
            </div>
          ))}
        </div>
      </Scroll>
    </Device>
  );

  if (screen==='marker') return (
    <MarkerScreen printed={printed} onPrinted={()=>S({printed:true})} onNext={()=>go('scan')} />
  );

  if (screen==='scan') return (
    <PolygonScanScreen onBack={()=>go('intro')} onManual={()=>go('polygon')}
      onDone={(outlineCm, bboxW, bboxD)=>S({ roomOutline:outlineCm, measuredW:bboxW, measuredD:bboxD,
        accuracy:null, source:'polygon', posX:Math.round(bboxW/2), posY:Math.round(bboxD/2), screen:'result' })} />
  );

  if (screen==='polygon') return (
    <PolygonMeasure onBack={()=>go('scan')}
      onDone={(outlineCm, bboxW, bboxD)=>S({ roomOutline:outlineCm, measuredW:bboxW, measuredD:bboxD,
        accuracy:null, source:'polygon', posX:Math.round(bboxW/2), posY:Math.round(bboxD/2), screen:'result' })} />
  );

  if (screen==='result') {
    const polyArea = isPoly ? (()=>{ let s=0; for(let i=0;i<roomPolyCm.length;i++){ const a=roomPolyCm[i], b=roomPolyCm[(i+1)%roomPolyCm.length]; s+=a[0]*b[1]-b[0]*a[1]; } return Math.abs(s)/2/10000; })() : (roomW*roomD/10000);
    const polyPerim = isPoly ? (()=>{ let s=0; for(let i=0;i<roomPolyCm.length;i++){ const a=roomPolyCm[i], b=roomPolyCm[(i+1)%roomPolyCm.length]; s+=Math.hypot(b[0]-a[0],b[1]-a[1]); } return s/100; })() : ((roomW+roomD)*2/100);
    const stats=[{k:'면적',v:polyArea.toFixed(1)+'㎡'},{k:'둘레',v:polyPerim.toFixed(1)+'m'},{k:'천장고',v:'2.3m'}];
    const planMarkers=[{id:'A',left:'0%',top:'100%'},{id:'B',left:'100%',top:'100%'},{id:'C',left:'0%',top:'0%'},{id:'D',left:'100%',top:'0%'}];
    return (
      <Device footer={<Btn onClick={()=>go('catalog')}>가구 고르기</Btn>}>
        <div style={{ padding:'6px 20px 0', display:'flex', gap:6 }}>
          {st.source==='polygon'
            ? <Badge color="var(--accent)" bg="rgba(0,102,255,0.1)">다각형</Badge>
            : st.source==='manual'
              ? <Badge color="var(--accent)" bg="rgba(0,102,255,0.1)">직접 입력</Badge>
              : <Badge color="var(--pos)" bg="rgba(0,191,64,0.1)">정확도 ±{(st.accuracy ?? 1.2).toFixed(1)}cm</Badge>}
          {st.measuredW==null && <Badge color="var(--muted)" bg="rgba(0,0,0,0.05)">기본값</Badge>}
        </div>
        <H title={st.source==='polygon' ? '방 그리기 완료' : st.source==='manual' ? '치수 입력 완료' : '측정 완료'}
          sub={st.source==='polygon' ? '그린 다각형 기준으로 배치 가능 여부를 확인해요.' : st.source==='manual' ? '입력한 치수로 배치 가능 여부를 확인해요.' : '마커 4개 기준으로 방 치수를 계산했습니다.'} />
        <Scroll>
          {isPoly ? (
            <div style={{ background:'#fff', borderRadius:20, padding:'22px', display:'flex', justifyContent:'center',
              boxShadow:'var(--card)', border:'1px solid rgba(17,24,39,.04)' }}>
              <svg viewBox={`-12 -12 ${roomW+24} ${roomD+24}`} style={{ width:'100%', maxWidth:300, aspectRatio:`${roomW+24} / ${roomD+24}` }}>
                <polygon points={roomPolyCm.map(p=>p.join(',')).join(' ')}
                  fill="rgba(0,102,255,0.06)" stroke="var(--accent)" strokeWidth="4" strokeLinejoin="round"/>
                {roomPolyCm.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r="7" fill="#fff" stroke="var(--accent)" strokeWidth="3"/>)}
              </svg>
            </div>
          ) : (
            <div style={{ background:'#fff', borderRadius:20, padding:'26px 20px', display:'flex', justifyContent:'center',
              boxShadow:'var(--card)', border:'1px solid rgba(17,24,39,.04)' }}>
              <div style={{ position:'relative' }}>
                <div style={{ position:'relative', width:planW, height:planH, background:'rgba(0,102,255,0.05)',
                  border:'2px solid var(--accent)', borderRadius:6 }}>
                  <div style={{ position:'absolute', top:-2, left:'30%', width:'40%', height:5, background:'#38bdf8', borderRadius:2 }} />
                  <div style={{ position:'absolute', top:-20, left:'30%', width:'40%', textAlign:'center' }}>
                    <Type v="caption" color="#38bdf8" weight="bold">창문</Type></div>
                  <div style={{ position:'absolute', right:0, bottom:0, width:DOOR/roomW*100+'%', height:DOOR/roomD*100+'%',
                    background:'repeating-linear-gradient(45deg,rgba(255,146,0,0.15) 0 6px,transparent 6px 12px)',
                    borderLeft:'1.5px dashed #f59e0b', borderTop:'1.5px dashed #f59e0b' }} />
                  {planMarkers.map(m=>(
                    <div key={m.id} style={{ position:'absolute', left:m.left, top:m.top, transform:'translate(-50%,-50%)',
                      width:22, height:22, borderRadius:6, background:'var(--accent)', color:'#fff', fontSize:11, fontWeight:800,
                      display:'flex', alignItems:'center', justifyContent:'center' }}>{m.id}</div>
                  ))}
                </div>
                <div style={{ position:'absolute', bottom:-26, left:0, right:0, textAlign:'center' }}>
                  <Type v="body2" weight="bold" color="var(--accent)">{roomWText}</Type></div>
                <div style={{ position:'absolute', right:-46, top:0, bottom:0, display:'flex', alignItems:'center' }}>
                  <Type v="body2" weight="bold" color="var(--accent)">{roomDText}</Type></div>
              </div>
            </div>
          )}
          <div style={{ display:'flex', gap:10, marginTop:34 }}>
            {stats.map(s=>(
              <div key={s.k} style={{ flex:1, background:'#fff', borderRadius:14, padding:'14px 8px', textAlign:'center',
                boxShadow:'var(--card)', border:'1px solid rgba(17,24,39,.04)' }}>
                <Type v="caption" color="var(--muted)">{s.k}</Type>
                <Type v="title3" weight="bold" style={{marginTop:4}}>{s.v}</Type>
              </div>
            ))}
          </div>
        </Scroll>
      </Device>
    );
  }

  if (screen==='catalog') return (
    <Device overlay={(previewId && (() => {
        const f = allFurn.find(x=>x.id===previewId); if(!f) return null; const ok=fitsAny(f);
        return (
          <div onClick={()=>setPreviewId(null)} style={{ position:'absolute', inset:0, zIndex:40, animation:'dim .22s ease both',
            display:'flex', flexDirection:'column', justifyContent:'flex-end', background:'rgba(10,14,20,0.42)' }}>
            <div onClick={e=>e.stopPropagation()} style={{ background:'#fff', borderRadius:'24px 24px 0 0', padding:'8px 20px calc(28px + env(safe-area-inset-bottom, 0px))',
              animation:'sheetup .34s cubic-bezier(.2,.75,.25,1) both', boxShadow:'0 -12px 40px rgba(16,24,40,.25)' }}>
              <div style={{ width:40, height:4, borderRadius:99, background:'#e5e7eb', margin:'6px auto 8px' }} />
              <div style={{ background:'#f6f7f9', borderRadius:18, overflow:'hidden' }}>
                <Furniture3D kind={f.kind||KIND[f.id]||'box'} code={f.modelCode||null} mesh={f.meshUrl||null} w={f.w} d={f.d} h={f.h} hex={f.fg} height={240} />
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:14 }}>
                <Badge size="xsmall" color={f.fg} bg={f.fg+'1A'}>{f.cat}</Badge>
                <Badge color={ok?'var(--pos)':'var(--neg)'} bg={ok?'rgba(0,191,64,0.1)':'rgba(255,66,66,0.1)'}>{ok?'배치 가능':'공간 부족'}</Badge>
              </div>
              <Type v="title3" weight="bold" style={{marginTop:8}}>{f.name}</Type>
              <Type v="body2" color="var(--muted)" style={{marginTop:2}}>W{f.w} × D{f.d} × H{f.h}cm · {won(f.price)}</Type>
              {f.url && <a href={f.url} target="_blank" rel="noreferrer" style={{ display:'inline-block', marginTop:6,
                color:'var(--accent)', fontWeight:700, fontSize:13, textDecoration:'none' }}>판매 페이지 열기 ↗</a>}
              <Type v="caption" color="var(--muted)" style={{marginTop:6}}>드래그해서 돌려볼 수 있어요</Type>
              <div style={{ display:'flex', gap:10, marginTop:16 }}>
                {f.custom && <Btn full={false} onClick={()=>{ setCustomFurn(cs=>cs.filter(x=>x.id!==f.id)); setPreviewId(null); }}
                  style={{padding:'14px 16px', background:'rgba(255,66,66,0.08)', color:'var(--neg)', boxShadow:'none'}}>삭제</Btn>}
                <Btn variant="ghost" full={false} onClick={()=>setPreviewId(null)} style={{padding:'14px 18px'}}>닫기</Btn>
                <Btn onClick={()=>{ S({selId:f.id, posX:Math.round((roomW-f.w)/2), posY:Math.max(0,Math.round((roomD-f.d)/2)-40), rotDeg:0, screen:'place'}); setPreviewId(null); }} style={{flex:1}}>이 가구 배치</Btn>
              </div>
            </div>
          </div>
        );
      })()) || (showAdd && (() => {
        const shapes=[['sofa','소파','소파','#0066FF'],['bed','침대','침대','#A44BE0'],['table','테이블','테이블','#00A038'],['shelf','책장','수납','#D97B00'],['wardrobe','옷장','수납','#D97B00']];
        const cur=shapes.find(x=>x[0]===addForm.shape)||shapes[0];
        const W=parseFloat(addForm.w), D=parseFloat(addForm.d), Hh=parseFloat(addForm.h);
        const dimsOk=[W,D,Hh].every(v=>isFinite(v)&&v>=10&&v<=1000);
        const canAdd=addForm.name.trim().length>0 && dimsOk;
        const inputSt={ width:'100%', fontFamily:'inherit', fontSize:16, padding:'10px 12px', border:'1px solid rgba(17,24,39,0.12)',
          borderRadius:10, background:'#F2F2F7', color:'var(--ink)', outline:'none', boxSizing:'border-box' };
        const submit=()=>{ if(!canAdd) return;
          const item={ id:'custom_'+Date.now(), name:addForm.name.trim(), cat:cur[2], w:Math.round(W), d:Math.round(D), h:Math.round(Hh),
            price:Math.max(0, Math.round(parseFloat(addForm.price)||0)), fg:cur[3], kind:cur[0], custom:true,
            url:addForm.url||undefined, modelCode:addForm.modelCode||undefined, meshUrl:addForm.meshUrl||undefined };
          setCustomFurn(cs=>[...cs, item]); setShowAdd(false); setAiUrl(''); setAiErr(null); setAiName(''); setAiNeedName(false);
          setAddForm({ name:'', shape:'sofa', w:'', d:'', h:'', price:'', url:'', modelCode:null, meshUrl:null });
          // 공용 카탈로그에 등록 → 다른 사용자도 사용(실물 GLB가 있고 링크가 있을 때만; 중복은 백엔드가 무시)
          if(_catBase() && item.meshUrl && item.url){
            fetch(_catBase()+'/catalog', { method:'POST', headers:{ 'content-type':'application/json' },
              body:JSON.stringify({ url:item.url, glbUrl:item.meshUrl, name:item.name, category:item.cat,
                w:item.w, d:item.d, h:item.h, color:item.fg, kind:item.kind, price:item.price }) }).catch(()=>{});
          } };
        const runAi=async()=>{
          const u=aiUrl.trim(); if(!u||aiBusy) return;
          // 이미 공용 카탈로그에 있는 상품이면 재사용(생성 비용 0)
          const dup=allFurn.find(f=>f.url && _prodKey(f.url)===_prodKey(u));
          if(dup){ const sh=shapes.find(x=>x[0]===dup.kind);
            setAddForm(fm=>({ ...fm, name:dup.name, shape:sh?sh[0]:fm.shape, w:String(dup.w), d:String(dup.d), h:String(dup.h),
              price:String(dup.price||0), url:u, meshUrl:dup.meshUrl||null, modelCode:dup.modelCode||null }));
            setAiErr('이미 등록된 상품이라 기존 3D를 재사용했어요 (생성 비용 0).'); setAiBusy(false); return; }
          setAiBusy('fetch'); setAiErr(null);
          let info=null;
          try{
            const j=await aiFetchFurniture(u, aiName);
            if(j && j.fail){ setAiNeedName(true);
              throw new Error(String(j.fail).slice(0,140)+' — 아래에 상품명을 붙여넣으면 상품명 기준으로 만들어드려요.'); }
            setAiNeedName(false);
            const okShapes=['sofa','bed','table','shelf','wardrobe'];
            const num=v=>{ const n=Math.round(parseFloat(v)); return isFinite(n)?n:NaN; };
            let w=num(j.w), d=num(j.d), h=num(j.h);
            if([w,d,h].some(v=>v>1000)){ w=Math.round(w/10); d=Math.round(d/10); h=Math.round(h/10); }
            if(![w,d,h].every(v=>isFinite(v)&&v>=10&&v<=1000)) throw new Error('치수를 인식하지 못했어요. 아래에 직접 입력해 주세요.');
            info={ name:String(j.name||'새 가구').slice(0,40), shape:okShapes.includes(j.shape)?j.shape:'table',
              w:w, d:d, h:h, price:Math.max(0,Math.round(Number(j.price)||0)),
              image:(typeof j.image==='string'&&j.image.indexOf('http')===0)?j.image:'', desc:String(j.desc||'') };
            setAddForm(fm=>({ ...fm, name:info.name, shape:info.shape, w:String(info.w), d:String(info.d), h:String(info.h),
              price:String(info.price), url:u, modelCode:null, meshUrl:null }));
          }catch(e){ setAiErr(e&&e.message?String(e.message).slice(0,180):'가져오기에 실패했어요'); setAiBusy(false); return; }
          // 비용 절감: 박스형 가구(테이블·선반·옷장)는 유료 실물 3D 생성을 건너뛰고 절차적 생성으로.
          // 소파·침대 등 형태가 복잡한 가구만 실물 3D를 만든다.
          const _boxy = new Set(['table','shelf','wardrobe']);
          if(info.image && !_boxy.has(info.shape)){
            setAiBusy('mesh');
            try{
              const cr=await fetch(DEFAULT_PROXY+'/meshy/image-to-3d', { method:'POST',
                headers:{ 'content-type':'application/json' }, body:JSON.stringify({ image_url: info.image }) }).then(r=>r.json());
              const tid=cr && cr.result;
              if(!tid) throw new Error((cr&&cr.error&&cr.error.message)||'작업 생성 실패');
              let glb=null;
              for(let i=0;i<70;i++){
                await new Promise(rs=>setTimeout(rs, 5000));
                const st=await fetch(DEFAULT_PROXY+'/meshy/task/'+tid).then(r=>r.json());
                if(st.status==='SUCCEEDED'){ glb=st.model_urls && st.model_urls.glb; break; }
                if(st.status==='FAILED'||st.status==='CANCELED') throw new Error((st.task_error&&st.task_error.message)||'변환 실패');
                setAiBusy('mesh:'+(st.progress||0));
              }
              if(!glb) throw new Error('시간 초과');
              setAddForm(fm=>({ ...fm, meshUrl: DEFAULT_PROXY+'/meshy/asset?url='+encodeURIComponent(glb), modelCode:null }));
              setAiBusy(false); return;
            }catch(e){ setAiErr('실물 3D 변환에 실패해 도형 방식으로 대신 만들어요 — '+String(e&&e.message||'').slice(0,100)); }
          }
          setAiBusy('model');
          try{
            const compiles=(code)=>{ try{ const fn=new Function('THREE','W','D','H','COLOR', code);
              const g=fn(THREE, info.w, info.d, info.h, '#888888'); return !!(g&&g.isObject3D); }catch(err){ return false; } };
            let code=await aiBuildModel(info);
            if(!compiles(code)){
              code=await aiBuildModel({ ...info, desc:(info.desc||'')+' [주의: 직전 생성 코드가 실행 오류였음. 검증된 기본 지오메트리만으로 단순·확실하게 다시 작성]' });
            }
            if(!compiles(code)) throw new Error('생성된 코드가 두 번 모두 실행되지 않았어요');
            setAddForm(fm=>({ ...fm, modelCode:code }));
          }catch(e){ setAiErr('3D 모델 생성에 실패해 기본 형태로 진행돼요'+(e&&e.message?' — '+String(e.message).slice(0,120):'')); }
          setAiBusy(false); };
        return (
          <div onClick={()=>setShowAdd(false)} style={{ position:'absolute', inset:0, zIndex:40, animation:'dim .22s ease both',
            display:'flex', flexDirection:'column', justifyContent:'flex-end', background:'rgba(10,14,20,0.42)' }}>
            <div onClick={e=>e.stopPropagation()} className="no-sb" style={{ background:'#fff', borderRadius:'24px 24px 0 0',
              padding:'8px 20px calc(24px + env(safe-area-inset-bottom, 0px))', maxHeight:'86%', overflowY:'auto',
              animation:'sheetup .34s cubic-bezier(.2,.75,.25,1) both', boxShadow:'0 -12px 40px rgba(16,24,40,.25)' }}>
              <div style={{ width:40, height:4, borderRadius:99, background:'#e5e7eb', margin:'6px auto 10px' }} />
              <Type v="title3" weight="bold">새 가구 추가</Type>
              <Type v="caption" color="var(--muted)" style={{marginTop:2}}>가구 판매 페이지 링크만 넣으면 AI가 치수 측정과 3D 모델 생성까지 알아서 해줘요.</Type>
              <div style={{ marginTop:14, background:'rgba(0,102,255,0.05)', border:'1px solid rgba(0,102,255,0.14)', borderRadius:14, padding:12 }}>

                <div style={{ display:'flex', gap:8, marginTop:8 }}>
                  <input value={aiUrl} onChange={e=>setAiUrl(e.target.value)} inputMode="url"

                  <Btn size="small" full={false} disabled={!!aiBusy||!aiUrl.trim()} onClick={runAi}
                    style={{whiteSpace:'nowrap', padding:'10px 14px'}}>{aiBusy==='fetch'?'페이지 분석 중…':aiBusy?'3D 생성 중…':'만들기'}</Btn>
                </div>
                {aiErr && <Type v="caption" color="var(--neg)" style={{marginTop:6}}>{aiErr}</Type>}
                {aiNeedName && (
                  <div style={{ display:'flex', gap:8, marginTop:8 }}>
                    <input value={aiName} onChange={e=>setAiName(e.target.value)}
                      placeholder="상품명 붙여넣기 (판매 페이지의 제품 이름)" style={{...inputSt, flex:1, minWidth:0}} />
                    <Btn size="small" full={false} disabled={!!aiBusy||!aiName.trim()} onClick={runAi}
                      style={{whiteSpace:'nowrap', padding:'10px 14px'}}>{aiBusy?'생성 중…':'상품명으로 만들기'}</Btn>
                  </div>
                )}
              </div>
              {canAdd ? (
                <div style={{ marginTop:12, border:'1px solid rgba(17,24,39,.06)', borderRadius:16, overflow:'hidden', boxShadow:'var(--card)' }}>
                  <div style={{ background:'#f6f7f9' }}>
                    <Furniture3D kind={cur[0]} code={addForm.modelCode||null} mesh={addForm.meshUrl||null} w={W} d={D} h={Hh} hex={cur[3]} height={170} />
                  </div>
                  <div style={{ padding:'12px 14px' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                      <Badge size="xsmall" color={cur[3]} bg={cur[3]+'1A'}>{cur[2]}</Badge>
                      {addForm.meshUrl
                        ? <Badge size="xsmall" color="var(--pos)" bg="rgba(0,191,64,0.1)">실물 3D (Meshy)</Badge>
                        : addForm.modelCode
                          ? <Badge size="xsmall" color="var(--pos)" bg="rgba(0,191,64,0.1)">AI 3D 모델</Badge>
                          : <Badge size="xsmall" color="var(--muted)" bg="rgba(0,0,0,0.05)">기본 형태</Badge>}
                    </div>
                    <Type v="body" weight="bold" style={{marginTop:6}}>{addForm.name}</Type>
                    <Type v="caption" color="var(--muted)" style={{marginTop:2}}>W{addForm.w} × D{addForm.d} × H{addForm.h}cm{Number(addForm.price)>0?' · '+won(Number(addForm.price)):''}</Type>
                    <Type v="caption" color="var(--muted)" style={{marginTop:4}}>드래그해서 돌려볼 수 있어요 · 치수는 판매 페이지 기준</Type>
                  </div>
                </div>
              ) : (
                <div style={{ marginTop:12, textAlign:'center', padding:'26px 14px', background:'rgba(17,24,39,0.03)',
                  borderRadius:16, border:'1px dashed rgba(17,24,39,0.12)' }}>
                  <div style={{ fontSize:26, marginBottom:6 }}>{aiBusy?'⏳':'🛒'}</div>
                  <Type v="body2" weight="bold" color="var(--muted)">
                    {aiBusy==='fetch'?'판매 페이지를 분석하고 있어요…'
                      :String(aiBusy).indexOf('mesh')===0?('상품 사진을 실물 3D로 변환하고 있어요… '+(String(aiBusy).split(':')[1]||'0')+'% (보통 1~3분)')
                      :aiBusy==='model'?'실물을 닮은 3D 모델을 만들고 있어요…':'위에 판매 링크를 넣으면 AI가 이름·치수·3D 모델을 만들어줘요'}</Type>
                </div>
              )}
              <div style={{ display:'flex', gap:10, marginTop:16 }}>
                <Btn variant="ghost" full={false} onClick={()=>setShowAdd(false)} style={{padding:'14px 18px'}}>취소</Btn>
                <Btn disabled={!canAdd} onClick={submit} style={{flex:1}}>추가하기</Btn>
              </div>
            </div>
          </div>
        );
      })())}>
      <H title="가구 선택" sub="측정한 방 기준으로 배치 가능 여부를 미리 표시합니다." />
      {placements.length>0 && (
        <div style={{ padding:'0 20px 6px' }}>
          <button onClick={()=>go('saved')} style={{ border:'none', background:'none', cursor:'pointer',
            color:'var(--accent)', fontWeight:700, fontSize:14, fontFamily:'inherit', padding:0 }}>
            저장된 배치 {placements.length}개 보기 →</button>
        </div>
      )}
      <div className="no-sb" style={{ display:'flex', gap:8, overflowX:'auto', padding:'8px 20px 14px' }}>
        {cats.map(c=><Chip key={c} label={c} active={cat===c} onClick={()=>S({cat:c})} />)}
      </div>
      <Scroll style={{paddingTop:0}}>
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          {items.map(f=>(
            <button key={f.id} onClick={()=>setPreviewId(f.id)} className="rt-cardbtn"
              style={{ border:'1px solid rgba(17,24,39,.04)', textAlign:'left', cursor:'pointer', fontFamily:'inherit',
                display:'flex', gap:14, alignItems:'center', background:'#fff', borderRadius:16, padding:14, boxShadow:'var(--card)' }}>
              <div style={{ width:64, height:64, borderRadius:12, flexShrink:0, background:f.fg+'12',
                display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden' }}>
                {thumbs[f.id]
                  ? <img src={thumbs[f.id]} alt={f.name} style={{ width:'100%', height:'100%', objectFit:'contain' }} />
                  : <div style={{ width:34, height:26, borderRadius:5, background:f.fg }} />}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <Badge size="xsmall" color={f.fg} bg={f.fg+'1A'}>{f.cat}</Badge>
                <Type v="body" weight="bold" style={{marginTop:5}}>{f.name}</Type>
                <Type v="caption" color="var(--muted)" style={{marginTop:2}}>W{f.w} × D{f.d} × H{f.h}cm</Type>
                <Type v="body2" weight="bold" style={{marginTop:4}}>{won(f.price)}</Type>
              </div>
              <Badge color={f.ok?'var(--pos)':'var(--neg)'} bg={f.ok?'rgba(0,191,64,0.1)':'rgba(255,66,66,0.1)'}>
                {f.ok?'배치 가능':'공간 부족'}</Badge>
            </button>
          ))}
          <button onClick={()=>setShowAdd(true)} className="rt-cardbtn"
            style={{ cursor:'pointer', fontFamily:'inherit', display:'flex', gap:10, alignItems:'center', justifyContent:'center',
              background:'rgba(0,102,255,0.04)', border:'1.5px dashed rgba(0,102,255,0.35)', borderRadius:16, padding:'16px 14px' }}>
            <span style={{ width:26, height:26, borderRadius:'50%', background:'rgba(0,102,255,0.12)', color:'var(--accent)',
              fontSize:17, fontWeight:800, display:'flex', alignItems:'center', justifyContent:'center', lineHeight:1 }}>+</span>
            <Type v="body2" weight="bold" color="var(--accent)">판매 링크로 가구 추가</Type>
          </button>
        </div>
      </Scroll>

    </Device>
  );

  if (screen==='place') {
    const selCx = clampedPos + effW/2, selCz = posYc + effD/2;
    const ghosts = placements.map(p=>({ key:p.key, kind:p.kind||KIND[p.id]||'box', modelCode:p.modelCode||null, meshUrl:p.meshUrl||null, w:p.w??p.effW, d:p.d??p.effD, h:p.h??80, rot:p.rot??0,
      cx:(p.posX + p.effW/2), cz:((p.posY??0) + p.effD/2), color:p.fg }));
    return (
      <Device footer={
        <div style={{display:'flex', flexDirection:'column', gap:10}}>
          <div style={{display:'flex', alignItems:'center', gap:10, background:'#fff', borderRadius:14, padding:'10px 14px',
            boxShadow:'var(--card)', border:'1px solid rgba(17,24,39,.04)'}}>
            <Type v="caption" weight="bold" color="var(--muted)" style={{flexShrink:0}}>회전</Type>
            <input type="range" min="0" max="355" step="5" value={rotDeg||0}
              onChange={e=>S({rotDeg:Number(e.target.value)})} style={{flex:1, minWidth:0}} />
            <Type v="body2" weight="bold" style={{width:40, textAlign:'right', flexShrink:0}}>{rotDeg||0}°</Type>
            <button onClick={()=>S(p=>({rotDeg:((p.rotDeg||0)+90)%360}))} style={{ flexShrink:0, border:'none', cursor:'pointer',
              background:'rgba(0,102,255,0.08)', color:'var(--accent)', borderRadius:9, padding:'6px 10px',
              fontSize:12.5, fontWeight:700, fontFamily:'inherit' }}>+90°</button>
          </div>
          <div style={{display:'flex', gap:10}}>
          <Btn disabled={!fits} onClick={()=>S(p=>({
              placements:[...p.placements,{key:Date.now(),id:sel.id,kind:sel.kind||KIND[sel.id]||'box',modelCode:sel.modelCode||null,meshUrl:sel.meshUrl||null,name:sel.name,fg:sel.fg,price:sel.price,
                posX:clampedPos,posY:posYc,w:sel.w,d:sel.d,h:sel.h,rot:p.rotDeg||0,effW,effD,gap:Math.round(gap)}],
              screen:'saved', shared:false }))} style={{flex:1}}>이 배치 저장</Btn>
          </div>
        </div>}>
        <div style={{ position:'relative', height:'100%', marginTop:'calc(-1 * var(--sb))', paddingTop:'var(--sb)', background:'#F2F2F7' }}>
          <RoomViewer3D outline={roomPolyCm.map(([x,z])=>[x/100,z/100])}
            door={isPoly?null:{x0:(roomW-DOOR)/100, x1:roomW/100, z:roomD/100, r:DOOR/100}}
            sel={{ id:sel.id, kind:sel.kind||KIND[sel.id]||'box', modelCode:sel.modelCode||null, meshUrl:sel.meshUrl||null, w:sel.w, d:sel.d, h:sel.h, color:sel.fg }}
            selCx={selCx} selCz={selCz} selRot={rotDeg||0} fits={fits} ghosts={ghosts}
            mode={st.viewMode}
            onDrag={(cx,cz)=>S({ posX: Math.round(cx-effW/2), posY: Math.round(cz-effD/2) })} />
          {/* top: furniture chip + plan/3D toggle */}
          <div style={{ position:'absolute', top:'calc(var(--sb) + 10px)', left:12, right:12, zIndex:6,
            display:'flex', alignItems:'center', justifyContent:'space-between', gap:8 }}>
            <div style={{ display:'flex', gap:8, alignItems:'center', minWidth:0 }}>
              <button onClick={()=>go('catalog')} aria-label="뒤로" style={{ flexShrink:0, cursor:'pointer',
                border:'1px solid rgba(17,24,39,0.08)', background:'rgba(255,255,255,0.94)', color:'var(--ink)',
                backdropFilter:'blur(8px)', boxShadow:'0 2px 10px rgba(16,24,40,.08)',
                borderRadius:99, width:34, height:34, fontSize:17, fontWeight:800, fontFamily:'inherit',
                display:'flex', alignItems:'center', justifyContent:'center', lineHeight:1 }}>←</button>
              <div style={{ display:'flex', gap:8, alignItems:'center', minWidth:0, background:'rgba(255,255,255,0.94)',
                border:'1px solid rgba(17,24,39,0.08)', backdropFilter:'blur(8px)', boxShadow:'0 2px 10px rgba(16,24,40,.08)',
                borderRadius:99, padding:'7px 12px' }}>
                <span style={{width:9,height:9,borderRadius:2,background:sel.fg,flexShrink:0}} />
                <Type v="body2" weight="bold" style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{sel.name} · {effW}×{effD}cm</Type>
              </div>
            </div>
            <div style={{ display:'flex', background:'rgba(255,255,255,0.94)', border:'1px solid rgba(17,24,39,0.08)',
              backdropFilter:'blur(8px)', boxShadow:'0 2px 10px rgba(16,24,40,.08)', borderRadius:99, padding:3, flexShrink:0 }}>
              {[['plan','2D'],['3d','3D']].map(([k,l])=>(
                <button key={k} onClick={()=>S({viewMode:k})} style={{ border:'none', cursor:'pointer', borderRadius:99,
                  padding:'6px 14px', fontSize:13, fontWeight:700, fontFamily:'inherit', transition:'background .18s, color .18s',

            boxShadow:'0 2px 8px rgba(16,24,40,.06)' }}>

          </div>
          {/* verdict */}
          <div style={{ position:'absolute', bottom:12, left:12, right:12, zIndex:6,
            display:'flex', gap:11, alignItems:'center', background:'rgba(255,255,255,0.97)', backdropFilter:'blur(8px)',
            border:'1px solid '+(fits?'rgba(0,191,64,0.45)':'rgba(255,66,66,0.45)'), borderRadius:14, padding:'11px 13px',

  if (screen==='saved') {
    const total=placements.reduce((a,p)=>a+p.price,0);
    return (
      <Device footer={placements.length>0 && <div style={{display:'flex',flexDirection:'column',gap:10}}>

        <Scroll>
          {placements.length===0 ? (

                alignItems:'center', justifyContent:'center', margin:'0 auto 14px', fontSize:28 }}>🛋️</div>
              <Type v="body" color="var(--muted)">저장된 배치가 없습니다</Type>
              <Btn full={false} onClick={()=>go('catalog')} style={{marginTop:16,padding:'10px 20px'}}>가구 고르기</Btn>
