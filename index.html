          ) : (
            <Fragment>
              <div style={{ background:'#fff', borderRadius:18, padding:16, marginBottom:16,
                boxShadow:'var(--card)', border:'1px solid rgba(17,24,39,.04)' }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
                  <Type v="body2" weight="bold">배치 도면</Type>
                  <div style={{ display:'flex', background:'rgba(17,24,39,0.05)', borderRadius:99, padding:3 }}>
                    {[['plan','2D'],['3d','3D']].map(([k,l])=>(
                      <button key={k} onClick={()=>setSavedView(k)} style={{ border:'none', cursor:'pointer', borderRadius:99,
                        padding:'5px 13px', fontSize:12.5, fontWeight:700, fontFamily:'inherit', transition:'background .18s, color .18s',
                        background: savedView===k?'var(--accent)':'transparent', color: savedView===k?'#fff':'#374151' }}>{l}</button>
                    ))}
                  </div>
                </div>
                {savedView==='3d' ? (
                  <Fragment>
                    <div style={{ position:'relative', height:320, borderRadius:14, overflow:'hidden', background:'#F2F2F7' }}>
                      <RoomViewer3D outline={roomPolyCm.map(([x,z])=>[x/100,z/100])}
                        door={isPoly?null:{x0:(roomW-DOOR)/100, x1:roomW/100, z:roomD/100, r:DOOR/100}}
                        sel={null} selCx={0} selCz={0} selRot={0} fits={true} mode="3d" onDrag={()=>{}}
                        ghosts={placements.map(p=>({ key:p.key, kind:p.kind||KIND[p.id]||'box', modelCode:p.modelCode||null, meshUrl:p.meshUrl||null, w:p.w??p.effW, d:p.d??p.effD, h:p.h??80, rot:p.rot??0,

                    </div>
                    <Type v="caption" color="var(--muted)" style={{marginTop:8, textAlign:'center'}}>빈 곳 드래그 = 시점 회전 · 스크롤 = 확대/축소</Type>
                  </Fragment>
                ) : isPoly ? (
                  <div style={{ display:'flex', justifyContent:'center' }}>
                  <svg viewBox={`-12 -12 ${roomW+24} ${roomD+24}`} style={{ width:'100%', maxWidth:300, aspectRatio:`${roomW+24} / ${roomD+24}` }}>
                    <polygon points={roomPolyCm.map(p=>p.join(',')).join(' ')}
                      fill="rgba(0,102,255,0.05)" stroke="var(--accent)" strokeWidth="4" strokeLinejoin="round"/>
                    {placements.map(p=>{ const pcx=p.posX+p.effW/2, pcz=(p.posY??0)+p.effD/2, pw=p.w??p.effW, pd=p.d??p.effD; return (
                      <g key={p.key}>
                        <rect x={pcx-pw/2} y={pcz-pd/2} width={pw} height={pd} rx="4"
                          transform={`rotate(${p.rot??0} ${pcx} ${pcz})`}
                          fill={`color-mix(in srgb, ${p.fg} 16%, white)`} stroke={p.fg} strokeWidth="3"/>
                        <text x={pcx} y={pcz} fill={p.fg}
                          fontSize={Math.max(12, Math.round(roomW/26))} fontWeight="700" textAnchor="middle" dominantBaseline="central">{p.name}</text>
                      </g>
                    ); })}
                  </svg>
                  </div>
                ) : (
                  <div style={{ display:'flex', justifyContent:'center' }}>
                  <div style={{ position:'relative', width:planW, height:planH, background:'rgba(0,0,0,0.03)',
                    border:'2px solid var(--accent)', borderRadius:6 }}>
                    <div style={{ position:'absolute', right:0, bottom:0, width:DOOR/roomW*100+'%', height:DOOR/roomD*100+'%',
                      background:'repeating-linear-gradient(45deg,rgba(255,146,0,0.15) 0 6px,transparent 6px 12px)' }} />
                    {placements.map(p=>{ const pw=p.w??p.effW, pd=p.d??p.effD, pcx=p.posX+p.effW/2, pcz=(p.posY??0)+p.effD/2; return (
                      <div key={p.key} style={{ position:'absolute', left:((pcx-pw/2)/roomW*100)+'%', top:((pcz-pd/2)/roomD*100)+'%',
                        width:(pw/roomW*100)+'%', height:(pd/roomD*100)+'%', transform:'rotate('+(p.rot??0)+'deg)',
                        background:`color-mix(in srgb, ${p.fg} 14%, white)`,
                        border:'1.5px solid '+p.fg, borderRadius:3, display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden' }}>
                        <span style={{fontSize:9,fontWeight:700,color:p.fg,padding:2,textAlign:'center'}}>{p.name}</span>
                      </div>
                    ); })}
                  </div>
                  </div>
                )}
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                {placements.map(p=>(
                  <div key={p.key} style={{ display:'flex', gap:12, alignItems:'center', background:'#fff', borderRadius:14, padding:14,
                    boxShadow:'var(--card)', border:'1px solid rgba(17,24,39,.04)' }}>
                    <div style={{ width:14, height:36, borderRadius:4, background:p.fg, flexShrink:0 }} />
                    <div style={{ flex:1, minWidth:0 }}>
                      <Type v="body" weight="bold">{p.name}</Type>
                      <Type v="caption" color="var(--muted)" style={{marginTop:2}}>W{p.effW} × D{p.effD}cm · 여유 {p.gap}cm</Type>
                    </div>
                    <Type v="body2" weight="bold">{won(p.price)}</Type>
                    <button onClick={()=>S(prev=>({placements:prev.placements.filter(x=>x.key!==p.key)}))}
                      style={{ border:'none', background:'none', cursor:'pointer', color:'var(--muted)', fontSize:18, padding:'0 2px' }}>×</button>
                  </div>
                ))}
              </div>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:16,
                padding:'14px 16px', background:'rgba(0,102,255,0.06)', border:'1px solid rgba(0,102,255,0.14)', borderRadius:14 }}>
                <Type v="body" weight="bold">예상 합계</Type>
                <Type v="title3" weight="bold" color="var(--accent)">{won(total)}</Type>
              </div>
            </Fragment>
          )}
        </Scroll>
      </Device>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
